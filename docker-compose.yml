services:
  # Elasticsearch 8.10.0（官方全球镜像）
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: es810
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - network.host=0.0.0.0
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - ai-network  # 正确缩进：和ports/environment同级
    restart: always

  # MinIO 8.5.12（官方全球镜像）
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: minio8512
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=admin123456
      - MINIO_SERVER_URL=http://0.0.0.0:9000
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - ai-network  # 正确缩进
    restart: always

  # Zookeeper（官方Confluent）
  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    container_name: zk321
    ports:
      - "2181:2181"
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - ZOOKEEPER_LISTEN_ALLIPS=true
    networks:
      - ai-network  # 正确缩进
    restart: always

  # Kafka 3.2.1（官方Confluent）
  kafka:
    image: confluentinc/cp-kafka:7.2.1
    container_name: kafka321
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_HEAP_OPTS=-Xms256m -Xmx512m
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
    depends_on:
      - zookeeper
    networks:
      - ai-network  # 正确缩进
    restart: always

  # Redis 7.0.11（官方镜像）
  redis:
    image: redis:7.0.11
    container_name: redis7011
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass 123456 --bind 0.0.0.0 --protected-mode no
    networks:
      - ai-network  # 正确缩进
    restart: always

  # MySQL 8.0（新增，适配项目配置）
  mysql:
    image: mysql:8.0
    container_name: mysql80
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=PaiSmart
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
      - TZ=Asia/Hong_Kong  # 适配香港时区
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ai-network  # 正确缩进
    restart: always

# 数据卷定义（和services同级）
volumes:
  es_data:
  minio_data:
  redis_data:
  mysql_data:  # 新增MySQL数据卷

# 网络定义（和services/volumes同级）
networks:
  ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16